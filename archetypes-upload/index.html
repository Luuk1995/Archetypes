  <style>
    @font-face { font-family:'SometypeMono'; src:url('fonts/SometypeMono-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:normal; }
    @font-face { font-family:'SometypeMono'; src:url('fonts/SometypeMono-Italic-VariableFont_wght.ttf') format('truetype'); font-weight:100 900; font-style:italic; }
    /* Static italic fallbacks for Chrome */
    @font-face { font-family:'SometypeMono'; src:url('fonts/static/SometypeMono-Italic.ttf') format('truetype'); font-weight:400; font-style:italic; }
    @font-face { font-family:'SometypeMono'; src:url('fonts/static/SometypeMono-MediumItalic.ttf') format('truetype'); font-weight:500; font-style:italic; }
    @font-face { font-family:'SometypeMono'; src:url('fonts/static/SometypeMono-BoldItalic.ttf') format('truetype'); font-weight:700; font-style:italic; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--font:'SometypeMono',monospace;--bg:#0c0c12;--fg:#f0ede6;--accent:#d4b96a;--img-w:63%}
    html{background:var(--bg)}
    body{font-family:var(--font);color:var(--fg);cursor:none;overflow:hidden;height:100vh}

    /* Italic ! always from SometypeMono italic */
    .exclaim{font-style:italic;font-family:'SometypeMono',monospace}

    /* ── CURSOR ── */
    #cursor{position:fixed;pointer-events:none;z-index:9999;width:10px;height:10px;border-radius:50%;background:var(--fg);transform:translate(-50%,-50%)}
    #cursor-glow{position:fixed;pointer-events:none;z-index:9998;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(212,185,106,.22) 0%,rgba(212,185,106,.08) 35%,transparent 70%);transform:translate(-50%,-50%)}

    /* ── GRAIN ── */
    #grain{position:fixed;inset:0;pointer-events:none;z-index:9990;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px;animation:gs .5s steps(2) infinite}
    @keyframes gs{0%{background-position:0 0}25%{background-position:20px -15px}50%{background-position:-10px 20px}75%{background-position:15px 10px}}

<script>
const DEFAULTS = {
  videos:{left:{type:'video',src:'videos/Video_Placeholder.mp4',label:'VIDEO ARCHITECTUUR'},right:{type:'video',src:'videos/Video_Placeholder.mp4',label:'VIDEO OBJECTEN'}},
  info:{title:'ARCHE!TYPES',p1:'Arche!Types is een onafhankelijk studio voor architectuur en objectontwerp. Wij ontwerpen ruimtes die verhalen dragen — gebouwd uit eerlijke materialen, gevoed door nieuwsgierigheid.',p2:'Elk project begint met een luisteren naar de plek. Elk object begint met een vraag aan het materiaal.',meta:'Vestiging — Amsterdam, NL\nContact — studio@archetypes.nl\nInstagram — @arche_types\nKVK — 00000000'},
  arche:[
    {title:'Viking Surf Shack',sub:'Amstelmeer – Uitbreiding Surfshop',desc:'Lokaal hout en oude windsurf spullen zijn verwerkt voor de hut. Er komt een nieuwe generatie surfers aan. De Viking shack is hun nest.',opdrachtgever:'Viking',programma:'Winkel 30m²',ontwerp:'Arche!Types',image:'images/arche_viking.jpg'},
    {title:'Woonhuis Poldervaartstraat',sub:'Verbouwing & Exterieur',desc:'Een nieuwbouwwoning met karakter. Verticale gevelbekleding, een pergola vol klimplanten en een tuin die uitnodigt tot leven.',opdrachtgever:'Menno',programma:'Woning 180m²',ontwerp:'Arche!Types',image:'images/arche_menno.jpg'},
    {title:'Last Paradise',sub:'Interieur & Exterieur Design',desc:'Een tropisch surfersoord waar bamboe, hout en open ruimte samenkomen. Het gebouw ademt de omgeving in en laat haar binnenkomen.',opdrachtgever:'Last Paradise',programma:'Resort Villa 320m²',ontwerp:'Arche!Types',image:'images/arche_paradise.jpg'}
  ],
  types:[
    {title:'Big Picknick',sub:'Buitenmeubilair — Op aanvraag',desc:'Massieve picknicktafel opgebouwd uit gestapelde bielzen. Robuust, tijdloos en volledig van gerecyclede spoorbielzen.',opdrachtgever:'Eigen productie',programma:'320 × 180 × 75 cm',ontwerp:'Arche!Types',image:'images/types_picknick.jpg'},
    {title:'Bielzen Bank',sub:'Zitmeubel — Op aanvraag',desc:'Laag zitmeubel in gebrand grenenhout met losse kussens. Geschikt voor binnen en buiten. Rust, eenvoud, ambacht.',opdrachtgever:'Eigen productie',programma:'L 120 × D 65 × H 35 cm',ontwerp:'Arche!Types',image:'images/types_bank.jpg'}
  ]
};

// ── SIMPLE MARKDOWN RENDERER ──
function renderMd(text) {
  if (!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}

// ── FRONTMATTER PARSER ──
function parseFrontmatter(text) {
  const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---/);
  if (!match) return {};
  const result = {};
  const lines = match[1].split('\n');
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    const keyMatch = line.match(/^(\w+):\s*(.*)/);
    if (!keyMatch) { i++; continue; }
    const key = keyMatch[1];
    let val = keyMatch[2].trim();
    i++;

    // Collect continuation lines (indented or starting without a key:)
    while (i < lines.length) {
      const next = lines[i];
      // If next line starts a new key, stop
      if (/^\w+:\s/.test(next) || /^\w+:$/.test(next)) break;
      // If next line is empty, stop
      if (next.trim() === '') break;
      // Continuation line — append with space
      val += ' ' + next.trim();
      i++;
    }

    // Remove surrounding quotes if present
    if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1,-1);
    else if (val.startsWith("'") && val.endsWith("'")) val = val.slice(1,-1);
    val = val.replace(/\\"/g, '"').replace(/\\n/g, '\n');

    if (/^\d+$/.test(val)) result[key] = parseInt(val);
    else result[key] = val;
  }
  return result;
}

// ── DYNAMIC FOLDER DISCOVERY ──
async function loadMdFolder(folder) {
  const items = [];
  let names = [];

  // Strategy 1: GitHub API (works for public repos)
  try {
    const apiUrl = `https://api.github.com/repos/Luuk1995/Archetypes/contents/archetypes-upload/data/${folder}`;
    const resp = await fetch(apiUrl, {headers:{'Accept':'application/vnd.github.v3+json'}});
    if (resp.ok) {
      const files = await resp.json();
      if (Array.isArray(files)) {
        names = files.filter(f=>f.name.endsWith('.md')).map(f=>f.name.replace('.md',''));
      }
    }
  } catch(e) {}

  // Strategy 2: directory listing
  if (names.length === 0) {
    try {
      const resp = await fetch(`data/${folder}/`);
      const text = await resp.text();
      const matches = [...text.matchAll(/href="([^"?#]*\.md)"/g)];
      names = matches.map(m=>m[1].replace(/.*\//,'').replace('.md',''));
    } catch(e) {}
  }

  // Strategy 3: hardcoded fallback with ALL known items
  if (names.length === 0) {
    names = folder === 'projecten'
      ? ['viking-surf-shack','woonhuis-poldervaartstraat','last-paradise',
         'last-paradise-surfstay','viking-surfcenter-amstelmeer','woonhuis-menno-poldervaartstraat']
      : ['big-picknick','bielzen-bank','zit-sta-bureau','test',
         'bielzen-bank-2','bigpicnic-amsterdam','mokummer-troon',
         'pergola-tafel','monochromatische-industrie-kast','kruiden-tafel'];
  }

  const texts = await Promise.all(
    names.map(n=>fetch(`data/${folder}/${n}.md`).then(r=>r.ok?r.text():null).catch(()=>null))
  );
  texts.forEach(t=>{if(t){const p=parseFrontmatter(t);if(p.title)items.push(p);}});
  return items.sort((a,b)=>(a.order||99)-(b.order||99));
}

async function loadAll() {
  try {
    const [info, videos] = await Promise.all([
      fetch('data/info.json').then(r=>r.json()).catch(()=>null),
      fetch('data/videos.json').then(r=>r.json()).catch(()=>null),
    ]);
    const [projecten, objecten] = await Promise.all([loadMdFolder('projecten'), loadMdFolder('objecten')]);
    renderVideos(videos||DEFAULTS.videos);
    renderProjects(projecten.length?projecten:DEFAULTS.arche, objecten.length?objecten:DEFAULTS.types);
    renderInfo(info||DEFAULTS.info);
  } catch(e) {
    renderVideos(DEFAULTS.videos); renderProjects(DEFAULTS.arche,DEFAULTS.types); renderInfo(DEFAULTS.info);
  }
}

function scrollToProjects(filter){
  const isMobile = window.innerWidth <= 768;
  if(isMobile && filter==='types'){
    // On mobile, types is below arche — scroll to types column
    const typesCol = document.getElementById('col-types');
    if(typesCol) typesCol.scrollIntoView({behavior:'smooth',block:'start'});

    scrollRoot.scrollTo({top:window.innerHeight,behavior:'smooth'});

      const archeCol = document.getElementById('col-arche');
      if(archeCol) archeCol.scrollIntoView({behavior:'smooth',block:'start'});

}

// ── SCROLLBAR ──
function initScrollbar(colId,thumbId){
  const col=document.getElementById(colId);
  const thumb=document.getElementById(thumbId);
  const update=()=>{
    if(!col||!thumb)return;
    const ratio=col.clientHeight/col.scrollHeight;
    const thumbH=Math.max(ratio*col.clientHeight,40);
    const maxTop=col.clientHeight-thumbH;
    const scrolled=col.scrollTop/Math.max(1,col.scrollHeight-col.clientHeight);
    thumb.style.height=thumbH+'px';
    thumb.style.top=(scrolled*maxTop)+'px';
  };
  col.addEventListener('scroll',update);
  window.addEventListener('resize',update);
  setTimeout(update,200);
}

// ── VIDEOS ──
function getYouTubeId(url){const m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}
function renderVideos(videos){
  ['left','right'].forEach(side=>{
    const wrap=document.getElementById('video-'+side);const vd=videos[side];wrap.innerHTML='';
    if(vd&&vd.type==='youtube'&&vd.src){
      const ytId=getYouTubeId(vd.src)||vd.src;const iframe=document.createElement('iframe');
      iframe.src=`https://www.youtube.com/embed/${ytId}?autoplay=1&mute=1&loop=1&playlist=${ytId}&controls=0&modestbranding=1&playsinline=1`;
      iframe.allow='autoplay; encrypted-media';iframe.style.cssText='width:100%;height:100%;border:none;filter:grayscale(1);transition:filter .5s ease;pointer-events:none';
      wrap.appendChild(iframe);wrap.addEventListener('mouseenter',()=>iframe.style.filter='grayscale(0)');wrap.addEventListener('mouseleave',()=>iframe.style.filter='grayscale(1)');
    } else if(vd&&vd.type==='video'&&vd.src){
      const vid=document.createElement('video');vid.autoplay=true;vid.muted=true;vid.loop=true;vid.playsInline=true;vid.innerHTML=`<source src="${vd.src}" type="video/mp4">`;wrap.appendChild(vid);
    } else if(vd&&vd.type==='image'&&vd.src){
      const img=document.createElement('img');img.src=vd.src;img.alt='';img.style.cssText='width:100%;height:100%;object-fit:cover;filter:grayscale(1);transition:filter .5s ease';
      wrap.addEventListener('mouseenter',()=>img.style.filter='grayscale(0)');wrap.addEventListener('mouseleave',()=>img.style.filter='grayscale(1)');wrap.appendChild(img);
    } else {
      const lbl=vd?.label||(side==='left'?'VIDEO ARCHITECTUUR':'VIDEO OBJECTEN');
      wrap.innerHTML=`<div class="video-placeholder"><span style="font-size:2rem;opacity:.1">▶</span><span>${lbl}</span></div>`;
    }
  });
}

// ── MAKE CARD ──
function makeCard(p) {
  const card=document.createElement('div');card.className='project-card';
  const inner=document.createElement('div');inner.className='card-inner';

  // Image
  const iw=document.createElement('div');iw.className='project-img-wrap';
  if(p.image){const img=document.createElement('img');img.src=p.image;img.alt=p.title;iw.appendChild(img);}
  else{const ph=document.createElement('div');ph.className='img-placeholder';ph.textContent=p.title.toUpperCase();iw.appendChild(ph);}

  // Right panel
  const right=document.createElement('div');right.className='project-right';
  const hoverEl=document.createElement('div');hoverEl.className='project-hover';
  const descEl=document.createElement('div');descEl.className='project-desc';
  const metaEl=document.createElement('div');metaEl.className='project-meta';
  hoverEl.appendChild(descEl);hoverEl.appendChild(metaEl);
  const label=document.createElement('div');label.className='project-label';
  label.innerHTML=`<div class="project-title">${p.title}</div><div class="project-subtitle">${p.sub}</div>`;
  right.appendChild(hoverEl);right.appendChild(label);

  inner.appendChild(iw);inner.appendChild(right);
  card.appendChild(inner);

  const isMobile = () => window.innerWidth <= 768;

  // Mobile tap: toggle text visibility
  card.addEventListener('click', () => {
    if (!isMobile()) return;
    // Fill text on first tap
    if (!card.classList.contains('tapped')) {
      const l1=p.label1||'Opdrachtgever',l2=p.label2||'Programma',l3=p.label3||'Ontwerp';
      const v1=p.waarde1||p.opdrachtgever||'',v2=p.waarde2||p.programma||'',v3=p.waarde3||p.ontwerp||'';
      let mh='';if(v1)mh+=`<strong>${l1}:</strong>${v1}`;if(v2)mh+=`<strong>${l2}:</strong>${v2}`;if(v3)mh+=`<strong>${l3}:</strong>${v3}`;
      metaEl.innerHTML=mh;
      descEl.innerHTML=renderMd(p.desc||'');
    }
    card.classList.toggle('tapped');
    // Collapse image on tap (color effect)
    if(card.classList.contains('tapped')) {
      const img = iw.querySelector('img');
      if(img) img.style.filter='grayscale(0)';
    } else {
      const img = iw.querySelector('img');
      if(img) img.style.filter='grayscale(1)';
    }
  });

  // Desktop hover
  let ti=null;
  iw.addEventListener('mouseenter',()=>{
    if(isMobile()) return;
    card.classList.add('img-hovered');
    const l1=p.label1||'Opdrachtgever',l2=p.label2||'Programma',l3=p.label3||'Ontwerp';
    const v1=p.waarde1||p.opdrachtgever||'',v2=p.waarde2||p.programma||'',v3=p.waarde3||p.ontwerp||'';
    let metaHtml='';
    if(v1)metaHtml+=`<strong>${l1}:</strong>${v1}`;
    if(v2)metaHtml+=`<strong>${l2}:</strong>${v2}`;
    if(v3)metaHtml+=`<strong>${l3}:</strong>${v3}`;
    metaEl.innerHTML=metaHtml;
    const fullText=p.desc||'';
    descEl.innerHTML='';let i=0;clearInterval(ti);
    ti=setInterval(()=>{
      if(i<fullText.length){i++;descEl.innerHTML=renderMd(fullText.substring(0,i));}
      else clearInterval(ti);
    },20);
  });
  iw.addEventListener('mouseleave',()=>{
    if(isMobile()) return;
    clearInterval(ti);descEl.innerHTML='';metaEl.innerHTML='';card.classList.remove('img-hovered');
  });

  return card;
}

// ── RENDER PROJECTS ──
function renderProjects(arche,types){

  types.forEach(p=>lt.appendChild(makeCard(p)));

}

// ── AUDIO ──
let ac=null,mg=null,ip=false;const at=document.getElementById('audio-toggle');
function startAmbient(){ac=new(window.AudioContext||window.webkitAudioContext)();mg=ac.createGain();mg.gain.setValueAtTime(0,ac.currentTime);mg.gain.linearRampToValueAtTime(.4,ac.currentTime+3);mg.connect(ac.destination);const bs=ac.sampleRate*4;const nb=ac.createBuffer(1,bs,ac.sampleRate);const nd=nb.getChannelData(0);for(let i=0;i<bs;i++)nd[i]=Math.random()*2-1;const w=ac.createBufferSource();w.buffer=nb;w.loop=true;const wf=ac.createBiquadFilter();wf.type='bandpass';wf.frequency.value=400;wf.Q.value=.3;const wg=ac.createGain();wg.gain.value=.12;w.connect(wf);wf.connect(wg);wg.connect(mg);w.start();const rb=ac.createBuffer(1,bs,ac.sampleRate);const rd=rb.getChannelData(0);for(let i=0;i<bs;i++)rd[i]=Math.random()<.003?(Math.random()*2-1)*.6:0;const r=ac.createBufferSource();r.buffer=rb;r.loop=true;const rg=ac.createGain();rg.gain.value=.25;r.connect(rg);rg.connect(mg);r.start();sv();}
function sv(){if(!ip)return;setTimeout(()=>{if(ip&&ac){const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=600;o.type='sawtooth';o.frequency.value=[196,220,246,261][Math.floor(Math.random()*4)];g.gain.setValueAtTime(0,ac.currentTime);g.gain.linearRampToValueAtTime(.06,ac.currentTime+3);g.gain.linearRampToValueAtTime(0,ac.currentTime+8);o.connect(f);f.connect(g);g.connect(mg);o.start();o.stop(ac.currentTime+9);sv();}},15000+Math.random()*30000);}
function toggleAudio(){if(!ip){ip=true;at.classList.add('playing');startAmbient();}else{ip=false;at.classList.remove('playing');if(mg){mg.gain.linearRampToValueAtTime(0,ac.currentTime+1.5);setTimeout(()=>{ac.close();ac=null;mg=null;},2000);}}}

// ── STARFIELD ──
(function(){
  const canvas=document.getElementById('starfield');canvas.style.cssText='position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 1.5s ease';
  const ctx=canvas.getContext('2d');let W,H,stars=[],shooters=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<300;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.2,o:Math.random()*.5+.15,tw:Math.random()*Math.PI*2,tws:(Math.random()*.005+.002)*(Math.random()<.5?1:-1)});
  function spawnShooter(){const a=Math.PI/6+Math.random()*Math.PI/8;shooters.push({x:Math.random()*W*.7,y:Math.random()*H*.3,vx:Math.cos(a)*(4+Math.random()*5),vy:Math.sin(a)*(4+Math.random()*5),life:1,decay:.025+Math.random()*.02,trail:[]});}
  function sched(){setTimeout(()=>{spawnShooter();sched();},3000+Math.random()*5000);}sched();
  function draw(){ctx.clearRect(0,0,W,H);stars.forEach(s=>{s.tw+=s.tws;const a=s.o+Math.sin(s.tw)*.15;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(240,237,230,${Math.max(0,Math.min(1,a))})`;ctx.fill();});shooters=shooters.filter(s=>s.life>0);shooters.forEach(s=>{s.trail.push({x:s.x,y:s.y});if(s.trail.length>18)s.trail.shift();s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;if(s.trail.length>1){const g=ctx.createLinearGradient(s.trail[0].x,s.trail[0].y,s.x,s.y);g.addColorStop(0,'rgba(240,237,230,0)');g.addColorStop(.5,`rgba(212,185,106,${s.life*.4})`);g.addColorStop(1,`rgba(255,255,255,${s.life*.9})`);ctx.beginPath();ctx.moveTo(s.trail[0].x,s.trail[0].y);s.trail.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(s.x,s.y);ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.stroke();}ctx.beginPath();ctx.arc(s.x,s.y,1.5,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.life})`;ctx.fill();});requestAnimationFrame(draw);}
  draw();
  // Show starfield when projects are visible
  scrollRoot.addEventListener('scroll',()=>{canvas.style.opacity=scrollRoot.scrollTop>window.innerHeight*.3?'1':'0';});
})();

renderVideos(DEFAULTS.videos);renderProjects(DEFAULTS.arche,DEFAULTS.types);renderInfo(DEFAULTS.info);
loadAll();
