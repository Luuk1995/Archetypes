backend:
  name: git-gateway
  branch: main

media_folder: "archetypes-upload/images"
public_folder: "/images"

collections:
  - name: "instellingen"
    label: "⚙️ Instellingen"
    files:
      - name: "algemeen"
        label: "Info & Contact"
        file: "archetypes-upload/data/info.json"
        fields:
          - { label: "Titel", name: "title", widget: "string", default: "ARCHE!TYPES" }
          - { label: "Eerste alinea", name: "p1", widget: "text" }
          - { label: "Tweede alinea", name: "p2", widget: "text" }
          - { label: "Contact / meta (één per regel)", name: "meta", widget: "text" }

      - name: "videos"
        label: "Hero Video's"
        file: "archetypes-upload/data/videos.json"
        fields:
          - label: "Video Links"
            name: "left"
            widget: "object"
            fields:
              - { label: "Type", name: "type", widget: "select", options: ["youtube", "video", "image", "placeholder"], default: "placeholder" }
              - { label: "URL / bestandsnaam", name: "src", widget: "string", required: false }
              - { label: "Label (bij placeholder)", name: "label", widget: "string", default: "VIDEO ARCHITECTUUR", required: false }
          - label: "Video Rechts"
            name: "right"
            widget: "object"
            fields:
              - { label: "Type", name: "type", widget: "select", options: ["youtube", "video", "image", "placeholder"], default: "placeholder" }
              - { label: "URL / bestandsnaam", name: "src", widget: "string", required: false }
              - { label: "Label (bij placeholder)", name: "label", widget: "string", default: "VIDEO OBJECTEN", required: false }

  - name: "projecten"
    label: "🏗️ Architectuur Projecten"
    folder: "archetypes-upload/data/projecten"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    identifier_field: "title"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Ondertitel / locatie", name: "sub", widget: "string", required: false }
      - { label: "Beschrijving", name: "desc", widget: "text", required: false }
      - { label: "Label 1 naam", name: "label1", widget: "string", default: "Opdrachtgever", required: false }
      - { label: "Label 1 waarde", name: "waarde1", widget: "string", required: false }
      - { label: "Label 2 naam", name: "label2", widget: "string", default: "Programma", required: false }
      - { label: "Label 2 waarde", name: "waarde2", widget: "string", required: false }
      - { label: "Label 3 naam", name: "label3", widget: "string", default: "Ontwerp", required: false }
      - { label: "Label 3 waarde", name: "waarde3", widget: "string", required: false }
      - { label: "Label 4 naam", name: "label4", widget: "string", default: "Aannemer", required: false }
      - { label: "Label 4 waarde", name: "waarde4", widget: "string", required: false }
      - { label: "Label 5 naam", name: "label5", widget: "string", default: "Video / Fotografie", required: false }
      - { label: "Label 5 waarde", name: "waarde5", widget: "string", required: false }
      - label: "Hoofdafbeelding (overzichtspagina)"
        name: "image"
        widget: "image"
        required: false
        hint: "Verschijnt op de scrollpagina als kaartafbeelding."
      - label: "Slideshow afbeelding 2"
        name: "image2"
        widget: "image"
        required: false
        hint: "Extra afbeelding in de slideshow (opent als je op de hoofdafbeelding klikt)."
      - label: "Slideshow afbeelding 3"
        name: "image3"
        widget: "image"
        required: false
      - label: "Slideshow afbeelding 4"
        name: "image4"
        widget: "image"
        required: false
      - label: "Slideshow afbeelding 5"
        name: "image5"
        widget: "image"
        required: false
      - label: "Slideshow afbeelding 6"
        name: "image6"
        widget: "image"
        required: false
      - label: "Slideshow afbeelding 7"
        name: "image7"
        widget: "image"
        required: false
      - label: "Slideshow afbeelding 8"
        name: "image8"
        widget: "image"
        required: false
      - { label: "Volgorde", name: "order", widget: "number", default: 99 }

  - name: "objecten"
    label: "🪑 Objecten / Types"
    folder: "archetypes-upload/data/objecten"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    identifier_field: "title"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Ondertitel / prijs", name: "sub", widget: "string", required: false }
      - { label: "Beschrijving", name: "desc", widget: "text", required: false }
      - { label: "Label 1 naam", name: "label1", widget: "string", default: "Opdrachtgever", required: false }
      - { label: "Label 1 waarde", name: "waarde1", widget: "string", required: false }
      - { label: "Label 2 naam", name: "label2", widget: "string", default: "Afmeting", required: false }
      - { label: "Label 2 waarde", name: "waarde2", widget: "string", required: false }
      - { label: "Label 3 naam", name: "label3", widget: "string", default: "Ontwerp", required: false }
      - { label: "Label 3 waarde", name: "waarde3", widget: "string", required: false }
      - { label: "Label 4 naam", name: "label4", widget: "string", default: "Materiaal", required: false }
      - { label: "Label 4 waarde", name: "waarde4", widget: "string", required: false }
      - { label: "Label 5 naam", name: "label5", widget: "string", default: "Prijs", required: false }
      - { label: "Label 5 waarde", name: "waarde5", widget: "string", required: false }
      - label: "Hoofdafbeelding (overzichtspagina)"
        name: "image"
        widget: "image"
        required: false
        hint: "Verschijnt op de scrollpagina als kaartafbeelding."
      - label: "Slideshow afbeelding 2"
        name: "image2"
        widget: "image"
        required: false
        hint: "Extra afbeelding in de slideshow (opent als je op de hoofdafbeelding klikt)."
      - label: "Slideshow afbeelding 3"
        name: "image3"
        widget: "image"
        required: false
      - label: "Slideshow afbeelding 4"
        name: "image4"
        widget: "image"
        required: false
      - label: "Slideshow afbeelding 5"
        name: "image5"
        widget: "image"
        required: false
      - label: "Slideshow afbeelding 6"
        name: "image6"
        widget: "image"
        required: false
      - label: "Slideshow afbeelding 7"
        name: "image7"
        widget: "image"
        required: false
      - label: "Slideshow afbeelding 8"
        name: "image8"
        widget: "image"
        required: false
      - { label: "Volgorde", name: "order", widget: "number", default: 99 }
