backend:
  name: git-gateway
  branch: main

media_folder: "archetypes-upload/images"
public_folder: "/images"

# Disable auto-deploy on every save — use Netlify's deploy control instead
publish_mode: editorial_workflow

collections:
  - name: "instellingen"
    label: "⚙️ Instellingen"
    files:
      - name: "algemeen"
        label: "Info & Contact"
        file: "archetypes-upload/data/info.json"
        fields:
          - { label: "Titel", name: "title", widget: "string", default: "ARCHE!TYPES" }
          - { label: "Eerste alinea", name: "p1", widget: "text" }
          - { label: "Tweede alinea", name: "p2", widget: "text" }
          - { label: "Contact / meta (één per regel)", name: "meta", widget: "text" }

      - name: "videos"
        label: "Hero Video's"
        file: "archetypes-upload/data/videos.json"
        fields:
          - label: "Video Links"
            name: "left"
            widget: "object"
            fields:
              - { label: "Type", name: "type", widget: "select", options: ["youtube", "video", "image", "placeholder"], default: "placeholder" }
              - { label: "URL / bestandsnaam", name: "src", widget: "string", required: false }
              - { label: "Label (bij placeholder)", name: "label", widget: "string", default: "VIDEO ARCHITECTUUR", required: false }
          - label: "Video Rechts"
            name: "right"
            widget: "object"
            fields:
              - { label: "Type", name: "type", widget: "select", options: ["youtube", "video", "image", "placeholder"], default: "placeholder" }
              - { label: "URL / bestandsnaam", name: "src", widget: "string", required: false }
              - { label: "Label (bij placeholder)", name: "label", widget: "string", default: "VIDEO OBJECTEN", required: false }

  - name: "projecten"
    label: "🏗️ Architectuur Projecten"
    folder: "archetypes-upload/data/projecten"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    identifier_field: "title"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Ondertitel / locatie", name: "sub", widget: "string" }
      - { label: "Beschrijving (markdown: **vet**, *schuin*, enters)", name: "desc", widget: "text" }
      - label: "Label 1 naam"
        name: "label1"
        widget: "string"
        default: "Opdrachtgever"
        required: false
      - { label: "Label 1 waarde", name: "opdrachtgever", widget: "string" }
      - label: "Label 2 naam"
        name: "label2"
        widget: "string"
        default: "Programma"
        required: false
      - { label: "Label 2 waarde", name: "programma", widget: "string" }
      - label: "Label 3 naam"
        name: "label3"
        widget: "string"
        default: "Ontwerp"
        required: false
      - { label: "Label 3 waarde", name: "ontwerp", widget: "string", default: "Arche!Types" }
      - { label: "Afbeelding", name: "image", widget: "image", required: false }
      - { label: "Volgorde", name: "order", widget: "number", default: 99 }

  - name: "objecten"
    label: "🪑 Objecten / Types"
    folder: "archetypes-upload/data/objecten"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    identifier_field: "title"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Ondertitel / prijs", name: "sub", widget: "string" }
      - { label: "Beschrijving (markdown: **vet**, *schuin*, enters)", name: "desc", widget: "text" }
      - label: "Label 1 naam"
        name: "label1"
        widget: "string"
        default: "Opdrachtgever"
        required: false
      - { label: "Label 1 waarde", name: "opdrachtgever", widget: "string", default: "Eigen productie" }
      - label: "Label 2 naam"
        name: "label2"
        widget: "string"
        default: "Afmeting"
        required: false
      - { label: "Label 2 waarde", name: "programma", widget: "string" }
      - label: "Label 3 naam"
        name: "label3"
        widget: "string"
        default: "Ontwerp"
        required: false
      - { label: "Label 3 waarde", name: "ontwerp", widget: "string", default: "Arche!Types" }
      - { label: "Afbeelding", name: "image", widget: "image", required: false }
      - { label: "Volgorde", name: "order", widget: "number", default: 99 }
